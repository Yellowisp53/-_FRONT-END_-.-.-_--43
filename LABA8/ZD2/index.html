<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="product-card">
        <div class="badge-installment">Рассрочка 6 мес.</div>
        
        <div class="card-content">
            <div class="image-section">
                <img src="holodos.jpg" alt="Bosch KGN39XI28R" class="main-photo">
                <div class="dots-bottom">● ● ● ● ● ● ●</div>
            </div>

            <div class="info-section">
                <h2 class="product-title">Холодильник Bosch KGN39XI28R</h2>
                <div class="status-row">
                    <span class="in-stock">✓ в наличии</span>
                </div>
                <div class="rating-row">
                    <div class="stars">
                        <span class="star filled">★</span>
                        <span class="star filled">★</span>
                        <span class="star filled">★</span>
                        <span class="star">★</span>
                        <span class="star">★</span>
                    </div>
                    <span class="reviews-count">(6)</span>
                </div>
                
                <div class="specs-list">
                    <p><span>Конструкция:</span> с нижней морозильной камерой</p>
                    <p><span>Исполнение:</span> свободностоящее</p>
                    <p><span>Система охлаждения:</span> полный No Frost</p>
                </div>
            </div>

            <div class="action-section">
                <div class="price-block">
                    <span class="price-label">Цена:</span>
                    <span class="price-value">4 716,34 руб.</span>
                </div>
                
                <div class="bonus-tag">94.33 балла на счет</div>
                
                <div class="purchase-row">
                    <div class="compare-toggle">
                        <span class="compare-label">Сравнить</span>
                        <label class="switch">
                            <input type="checkbox">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <button class="buy-button">Купить</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
